<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Mohammed Mustajab Abedi | Portfolio</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#0b0d10',
                            charcoal: '#15181e',
                            gray: '#282d38',
                            cream: '#e8e6df',
                            muted: '#8f97a3'
                        },
                        tech: {
                            yellow: '#FFFF00',
                            black: '#000000'
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        mono: ['"Share Tech Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0b0d10;
            color: #e8e6df;
            overflow-x: hidden;
        }

        .bg-grid-monochrome {
            background-image:
                linear-gradient(to right, rgba(232, 230, 223, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(232, 230, 223, 0.02) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0d10;
        }

        ::-webkit-scrollbar-thumb {
            background: #282d38;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #FFFF00;
        }

        /* Tactical HUD */
        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            from {
                transform: rotate(360deg);
            }

            to {
                transform: rotate(0deg);
            }
        }

        .hud-spin-1 {
            animation: spin-slow 12s linear infinite;
        }

        .hud-spin-2 {
            animation: spin-reverse 8s linear infinite;
        }

        /* The Sonar Echo Ping */
        @keyframes sonar-ping {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
                border-width: 6px;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.6);
                opacity: 0;
                border-width: 1px;
            }
        }

        .sonar-echo {
            animation: sonar-ping 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="antialiased min-h-[100vh] font-serif selection:bg-tech-yellow selection:text-tech-black">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useRef, useEffect } = React;

        const OldMoneyYellowUnderneath = ({ title, year, techData }) => (
            <div className="absolute inset-0 w-full h-full bg-brand-charcoal flex flex-col justify-center p-10 md:p-14 border-4 border-tech-yellow/50">
                <div className="flex-grow flex flex-col justify-between max-w-4xl relative z-10 w-full">
                    <div className="flex justify-between items-end border-b border-tech-yellow/30 pb-4 mb-6">
                        <h4 className="font-serif italic text-3xl md:text-5xl text-brand-cream flex items-center gap-4">
                            <span className="text-tech-yellow text-xl font-normal not-italic px-2 py-1 bg-tech-yellow/10">§</span>
                            Architectural Specs
                        </h4>
                        <span className="font-serif text-tech-yellow italic opacity-80 text-xl">{year}</span>
                    </div>

                    <div className="space-y-4 max-w-3xl flex-grow flex flex-col justify-center border-l-2 border-tech-yellow pl-8 bg-brand-black/20 p-6">
                        {techData.logs.map((log, i) => (
                            <p key={i} className="font-serif text-lg text-tech-yellow leading-relaxed flex items-start">
                                <span className="text-brand-cream font-serif mr-4 opacity-50">✦</span>
                                <span className="opacity-90">{log}</span>
                            </p>
                        ))}
                    </div>

                    <div className="mt-8 flex items-end gap-6 pt-6">
                        <span className="font-serif uppercase tracking-[0.3em] text-[10px] text-tech-yellow border-b border-tech-yellow pb-1">Protocols Executed</span>
                        <div className="flex gap-6">
                            {techData.hardSkills.map(skill => (
                                <span key={skill} className="font-serif italic text-brand-cream text-lg underline decoration-tech-yellow/40">{skill}</span>
                            ))}
                        </div>
                    </div>
                </div>
                <div className="absolute top-1/2 right-10 -translate-y-1/2 w-64 h-64 bg-tech-yellow/10 blur-3xl rounded-full pointer-events-none"></div>
            </div>
        );

        const TechCover = ({ title, desc, year, tags, sysCode }) => (
            <div className="absolute top-0 left-0 w-full h-full bg-brand-black flex justify-center items-center">
                <div className="w-full h-full p-8 md:p-14 flex flex-col bg-grid-monochrome relative border-r-4 border-b-4 border-brand-gray/30">
                    <div className="absolute top-0 right-10 bg-brand-gray text-brand-cream px-4 py-1 font-mono text-[10px] uppercase tracking-[0.3em] font-bold">
                        [SYS: {sysCode}]
                    </div>
                    <div className="flex-grow flex flex-col justify-center max-w-3xl">
                        <h3 className="font-mono text-4xl md:text-5xl text-brand-cream mb-8 uppercase tracking-widest leading-tight">
                            &gt; {title}
                        </h3>
                        <p className="font-mono text-sm md:text-base text-brand-muted leading-loose border-l border-brand-gray pl-6">
                            {desc}
                        </p>
                        <div className="mt-10 flex gap-4 text-brand-muted">
                            <div className="font-mono text-[10px] border border-brand-gray px-3 py-1 bg-brand-charcoal tracking-widest">ENCRYPTED_LOGS</div>
                        </div>
                    </div>
                    <div className="absolute bottom-10 right-10 flex gap-3 opacity-60">
                        {tags.map(tag => (
                            <span key={tag} className="font-mono text-[10px] uppercase text-brand-cream tracking-widest">[{tag}]</span>
                        ))}
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // THE LASER REVEAL (HUD + PLASMA + SONAR)
        // ==========================================
        const LaserProjectCard = ({ title, desc, year, tags, techData }) => {
            const cardRef = useRef(null);
            const [mousePos, setMousePos] = useState({ x: -1000, y: -1000 });
            const [isHovered, setIsHovered] = useState(false);
            const [trails, setTrails] = useState([]);

            const radius = 250;

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                setMousePos({ x, y });

                // Sonar Echo Logic
                const now = Date.now();
                setTrails(prev => {
                    const valid = prev.filter(t => now - t.id < 700);
                    const last = valid[valid.length - 1];
                    if (!last || Math.hypot(last.x - x, last.y - y) > 90) {
                        return [...valid, { x, y, id: now }];
                    }
                    return valid;
                });
            };

            return (
                <div
                    ref={cardRef}
                    className="relative w-full border-b border-brand-charcoal group min-h-[460px] cursor-none overflow-hidden"
                    onMouseMove={handleMouseMove}
                    onMouseEnter={(e) => {
                        if (cardRef.current) {
                            const rect = cardRef.current.getBoundingClientRect();
                            setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                        }
                        setIsHovered(true);
                    }}
                    onMouseLeave={() => {
                        setIsHovered(false);
                        setTrails([]);
                    }}
                >
                    {/* Base Layer: Tech Cover (Always visible) */}
                    <div className="absolute inset-0 z-10 pointer-events-none">
                        <TechCover title={title} desc={desc} year={year} tags={tags} sysCode={techData.sysCode} />
                    </div>

                    {/* Masked Layer: Old Money + Yellow */}
                    <div
                        className="absolute inset-0 z-20 pointer-events-none"
                        style={{
                            opacity: isHovered ? 1 : 0,
                            transition: 'opacity 0.3s ease-out',
                            clipPath: `circle(${isHovered ? radius : 0}px at ${mousePos.x}px ${mousePos.y}px)`
                        }}
                    >
                        <OldMoneyYellowUnderneath title={title} year={year} techData={techData} />

                        {/* THE SONAR ECHOS */}
                        {trails.map(t => (
                            <div
                                key={t.id}
                                className="absolute z-30 pointer-events-none rounded-full border-2 border-tech-yellow/80 sonar-echo mix-blend-overlay"
                                style={{
                                    left: `${t.x}px`,
                                    top: `${t.y}px`,
                                    width: `${radius * 2}px`,
                                    height: `${radius * 2}px`,
                                }}
                            />
                        ))}

                        {/* --- THE APPLE LIQUID GLASS LENS --- */}
                        <div
                            className="absolute z-50 pointer-events-none block"
                            style={{
                                left: `${mousePos.x}px`,
                                top: `${mousePos.y}px`,
                                transform: 'translate(-50%, -50%)',
                                width: `${radius * 2}px`,
                                height: `${radius * 2}px`,
                                opacity: isHovered ? 1 : 0,
                                transition: 'opacity 0.2s ease-out'
                            }}
                        >
                            {/* 1. Heavy Liquid Glass Bevel (Emphasized thickness and light reflection) */}
                            <div className="absolute inset-[-4px] rounded-full border-[3px] border-white/40 shadow-[inset_0_5px_20px_rgba(255,255,255,0.4),_0_20px_50px_rgba(0,0,0,0.9)] pointer-events-none mix-blend-screen"></div>

                            {/* 2. Inner Golden Refraction Ring */}
                            <div className="absolute inset-[2px] rounded-full border-[2px] border-tech-yellow/50 shadow-[inset_0_0_30px_rgba(255,255,0,0.2)] pointer-events-none"></div>

                            {/* 3. Static Registration Marks */}
                            <div className="absolute top-1/2 left-[12%] right-[12%] h-[1px] bg-tech-yellow/30 shadow-[0_0_5px_rgba(255,255,0,0.5)] pointer-events-none"></div>
                            <div className="absolute top-[12%] bottom-[12%] left-1/2 w-[1px] bg-tech-yellow/30 shadow-[0_0_5px_rgba(255,255,0,0.5)] pointer-events-none"></div>

                            {/* 4. Tracking Data Readout */}
                            <div className="absolute bottom-[20%] right-[20%] font-mono text-[9px] text-tech-yellow bg-brand-charcoal/80 px-2 py-1 uppercase tracking-[0.2em] font-normal backdrop-blur-md rounded-full border border-white/20 shadow-lg">
                                TARGET_X:{Math.round(mousePos.x)} Y:{Math.round(mousePos.y)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const App = () => {
            const projects = [
                {
                    title: "Local AI Agent",
                    desc: "A fully localized, production-grade AI infrastructure built from the ground up in JupyterLab. Developed as an active member of the AMD Dev Program, establishing robust pipelines without external cloud dependence.",
                    year: "2024",
                    tags: ["Pydantic_AI", "LLM", "Infra"],
                    techData: {
                        sysCode: "LOCAL_AGENT_INIT",
                        logs: [
                            "Deployed a fully local, zero-cloud dependency AI infrastructure utilizing the Qwen3-30B-A3B model executing directly on CPU environments.",
                            "Engineered a custom JupyterLab environment bridged to an OpenAI-compatible API endpoint, establishing seamless localized inference.",
                            "Integrated the Pydantic AI framework, systematically resolving complex downstream pip dependency and apt repository conflicts.",
                            "Manually configured Node.js v24.13 via NodeSource to serve as a stable Model Context Protocol (MCP) layer."
                        ],
                        hardSkills: ["LocalAI", "AMD", "MCP Server"]
                    }
                },
                {
                    title: "Autonomous Vehicles",
                    desc: "An in-depth coordination exploring the four pillars of vehicular autonomy: localization, perception, planning, and control, engineered alongside architectures from the Autoware Foundation.",
                    year: "2024",
                    tags: ["Robotics", "ROS", "Perception"],
                    techData: {
                        sysCode: "PERCEPTION_NODE",
                        logs: [
                            "Explored comprehensive sensor fusion integrations, mapping critical data pathways between optical cameras, LIDAR, RADAR, GPS, and IMU cascades.",
                            "Analyzed environmental degradation boundaries, evaluating LIDAR signal attenuation in precipitation models against robust RADAR fallback systems.",
                            "Architected high-efficiency node communication protocols utilizing the Robot Operating System (ROS) message handling system.",
                            "Validated baseline perception methodologies utilizing the Autoware Foundation stack deployed within the Construct."
                        ],
                        hardSkills: ["ROS Framework", "LIDAR Integration", "Autoware"]
                    }
                },
                {
                    title: "Humanoid OpenCV",
                    desc: "Advanced computer vision methodologies integrating deep software abstraction layers with humanoid hardware logic, ensuring stable real-time spatial and frame processing.",
                    year: "2023",
                    tags: ["Comp_Vision", "Hardware"],
                    techData: {
                        sysCode: "CV_VISION_MATRIX",
                        logs: [
                            "Architected dense software-to-hardware abstraction layers seamlessly bridging optical data ingest with core mechanical logic.",
                            "Engineered custom computer vision pipelines utilizing raw OpenCV bindings for sophisticated real-time object tracking.",
                            "Enforced strict programmatic performance paradigms, ensuring real-time frame matrix rendering with minimal latency.",
                            "Emphasized clean, modular architectures designed to significantly optimize underlying hardware computation cycles."
                        ],
                        hardSkills: ["OpenCV", "C++ Logic", "Algorithms"]
                    }
                }
            ];

            return (
                <div className="min-h-screen flex flex-col relative w-full">

                    <header className="relative min-h-[90vh] flex flex-col px-8 md:px-16 pt-12 pb-24">
                        <nav className="flex justify-between items-center w-full z-10">
                            <span className="font-serif text-sm tracking-widest text-brand-muted uppercase border-b border-brand-gray pb-1">
                                AI & Robotics
                            </span>
                            <span className="font-serif italic text-xl text-brand-cream">Seyyid.</span>
                        </nav>

                        <div className="flex-grow flex flex-col justify-center items-center text-center mt-16 relative z-10 w-full max-w-5xl mx-auto">
                            <h2 className="font-serif italic text-2xl md:text-3xl text-brand-muted mb-8 opacity-80 decoration-brand-gray underline-offset-8">
                                Syed Mohammed Mustajab Abedi
                            </h2>
                            <h1 className="font-serif text-5xl md:text-7xl lg:text-[7rem] text-brand-cream font-bold leading-[1.05] tracking-tight mb-12">
                                The Architecture of Intelligence.
                            </h1>
                            <div className="w-px h-16 bg-brand-gray mb-12"></div>
                            <p className="font-serif text-lg md:text-xl text-brand-muted max-w-2xl leading-relaxed italic border-l-2 block border-brand-gray pl-8 text-left">
                                A first-year Data Science pragmatist engineering clean logic. Shaping localized AI agents, exploring autonomous vehicular systems, and pushing the boundaries of ethical hardware integration.
                            </p>
                        </div>
                    </header>

                    <main id="projects" className="w-full relative bg-brand-black border-t border-brand-gray z-20">
                        <div className="px-8 md:px-16 py-16 flex flex-col gap-4 border-b border-brand-gray relative overflow-hidden">
                            <h2 className="font-serif text-brand-cream text-4xl uppercase tracking-widest">Systems Log</h2>
                            <span className="font-serif uppercase text-[10px] tracking-[0.4em] text-tech-yellow">Hover to engage deep architectural scanning.</span>
                        </div>

                        <div className="flex flex-col bg-brand-black">
                            <LaserProjectCard {...projects[0]} />
                            <LaserProjectCard {...projects[1]} />
                            <LaserProjectCard {...projects[2]} />
                        </div>
                    </main>

                    <section id="skills" className="px-8 md:px-16 py-32 bg-brand-charcoal relative border-b border-brand-gray z-10">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-20">
                            <div className="w-full md:w-1/3">
                                <h2 className="font-serif text-4xl text-brand-cream mb-8">Capabilities</h2>
                                <p className="font-serif italic text-brand-muted text-lg leading-relaxed">
                                    Precision meets complexity. A curated toolkit connecting high-level theoretical logic with low-level hardware persistence.
                                </p>
                            </div>

                            <div className="w-full md:w-2/3 grid grid-cols-2 md:grid-cols-3 gap-y-16 gap-x-8">
                                <div>
                                    <span className="font-serif uppercase text-[10px] tracking-[0.3em] text-brand-cream block mb-6 border-b border-brand-gray pb-3">Languages</span>
                                    <ul className="font-serif italic text-brand-muted space-y-4 text-lg">
                                        <li>Python</li>
                                        <li>C++</li>
                                        <li>Javascript (JSX)</li>
                                        <li>SQL</li>
                                        <li>HTML / CSS</li>
                                    </ul>
                                </div>
                                <div>
                                    <span className="font-serif uppercase text-[10px] tracking-[0.3em] text-brand-cream block mb-6 border-b border-brand-gray pb-3">Frameworks</span>
                                    <ul className="font-serif italic text-brand-muted space-y-4 text-lg">
                                        <li>React</li>
                                        <li>ROS2</li>
                                        <li>Pydantic AI</li>
                                        <li>MongoDB</li>
                                    </ul>
                                </div>
                                <div>
                                    <span className="font-serif uppercase text-[10px] tracking-[0.3em] text-brand-cream block mb-6 border-b border-brand-gray pb-3">Disciplines</span>
                                    <ul className="font-serif italic text-brand-muted space-y-4 text-lg">
                                        <li>AI Agents</li>
                                        <li>Machine Learning</li>
                                        <li>Ethical Hacking</li>
                                        <li>Data Science</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer id="contact" className="px-8 md:px-16 py-32 bg-brand-charcoal border-t border-brand-gray flex flex-col items-center justify-center relative z-10">
                        <h2 className="font-serif text-3xl md:text-6xl text-brand-cream mb-16 text-center max-w-4xl tracking-tight leading-tight">
                            Ready to engineer the future. Seeking roles in ML, Robotics & Software Engineering.
                        </h2>
                        <div className="flex gap-12 mb-16">
                            <a href="#" className="font-serif text-brand-muted hover:text-brand-cream uppercase tracking-[0.2em] text-sm transition">LinkedIn</a>
                            <a href="#" className="font-serif text-brand-muted hover:text-brand-cream uppercase tracking-[0.2em] text-sm transition">Email</a>
                            <a href="#" className="font-serif text-brand-muted hover:text-brand-cream uppercase tracking-[0.2em] text-sm transition">Github</a>
                        </div>
                        <div className="font-serif italic text-brand-gray text-sm mb-8">
                            Syed Mohammed Mustajab Abedi. 2024.
                        </div>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
